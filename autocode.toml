[project]
language = "python"
source_files = ["src/**/*.py"]
read_only = ["tests/**", "benchmarks/**", "tests/golden/**"]

[metrics]

# Tests are the ground truth (mirrors testthat). Highest weight — breaking tests, including
# @pytest.mark.parity tests, is never acceptable. Weights re-normalized to sum to 1.0 when the
# performance metric was enabled (Phase 6): tests 0.42, quality 0.14, types 0.14, performance 0.30.
[metrics.tests]
command = ".venv/Scripts/python.exe -m pytest --tb=short -q 2>&1"
parser = "pytest"
weight = 0.42
direction = "up"

# Lint issue count (ruff). 'All checks passed!' yields no match -> treated as 0.
[metrics.quality]
command = ".venv/Scripts/python.exe -m ruff check . 2>&1"
parser = "regex"
pattern = "Found (\\d+) error"
weight = 0.14
direction = "down"

# Static-type error count (mypy strict). 'Success: ...' yields no match -> treated as 0.
[metrics.types]
command = ".venv/Scripts/python.exe -m mypy 2>&1"
parser = "regex"
pattern = "Found (\\d+) error"
weight = 0.14
direction = "down"

# Performance: full-pipeline wall-clock (benchmarks/bench.py prints "PIPELINE_SECONDS: <n>").
# Enabled in Phase 6 (stages 1-3 migrated + bench.py exists). bench.py freezes the input dataset
# for A/Bs (defaults to the sibling frozen corpus, else the committed fixture corpus) and reports
# the min over WHEP_BENCH_ITERATIONS runs to damp OS/spawn jitter.
[metrics.performance]
command = ".venv/Scripts/python.exe benchmarks/bench.py 2>&1"
parser = "regex"
pattern = "PIPELINE_SECONDS:\\s*([\\d.]+)"
weight = 0.30
direction = "down"
