[project]
language = "python"
source_files = ["src/**/*.py"]
read_only = ["tests/**", "benchmarks/**", "tests/golden/**"]

[metrics]

# Tests are the ground truth (mirrors testthat). Highest weight — breaking tests, including
# @pytest.mark.parity tests, is never acceptable.
[metrics.tests]
command = ".venv/Scripts/python.exe -m pytest --tb=short -q 2>&1"
parser = "pytest"
weight = 0.6
direction = "up"

# Lint issue count (ruff). 'All checks passed!' yields no match -> treated as 0.
[metrics.quality]
command = ".venv/Scripts/python.exe -m ruff check . 2>&1"
parser = "regex"
pattern = "Found (\\d+) error"
weight = 0.2
direction = "down"

# Static-type error count (mypy strict). 'Success: ...' yields no match -> treated as 0.
[metrics.types]
command = ".venv/Scripts/python.exe -m mypy 2>&1"
parser = "regex"
pattern = "Found (\\d+) error"
weight = 0.2
direction = "down"

