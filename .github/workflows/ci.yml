name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs only for pull requests (a new push to a PR obsoletes the old run).
  # Pushes to a branch — especially main — always run to completion, so every commit on main
  # gets a conclusive check. Previously `cancel-in-progress: true` applied to main too: a burst
  # of merges made each main push cancel the one before it ("Canceling since a higher priority
  # waiting request for ci-<ref> exists"), leaving main without a green run.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest (with coverage gate)
        # --cov enforces [tool.coverage.report] fail_under (90%); parity tests skip in CI
        # (R goldens are gitignored) but the non-parity suite still covers >90%.
        run: uv run pytest -q --cov=whep_digitize --cov-report=term-missing
